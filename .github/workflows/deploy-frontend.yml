name: Frontend CI/CD

on:
  push:
    branches: [develop, staging, main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1

jobs:
  # ── Resolve which environment this push targets ──────────
  resolve-env:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == "staging" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

  # ── Build React app and deploy to S3 + CloudFront ───────
  # Production job is gated by GitHub environment's "Required reviewers" setting.
  build-and-deploy:
    needs: resolve-env
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-env.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build React app
        # REACT_APP_API_URL is set per-environment in GitHub environment variables
        # (not secrets — it's a public URL, not a credential)
        working-directory: frontend
        env:
          REACT_APP_API_URL: ${{ vars.API_URL }}
          # Ensures CRA optimises the build (minification, tree-shaking, etc.)
          NODE_ENV: production
        run: npm run build

      - name: Configure AWS credentials (OIDC — no static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload hashed assets to S3 (cache 1 year)
        # CRA outputs content-hashed JS/CSS filenames — safe to cache aggressively.
        # We exclude index.html here and upload it separately with no-cache headers.
        run: |
          aws s3 sync frontend/build/ s3://${{ vars.FRONTEND_BUCKET }} \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable" \
            --delete

      - name: Upload index.html to S3 (no cache)
        # index.html must never be cached — it is the SPA entry point and changes
        # every deploy. CloudFront invalidation ensures old copies are purged.
        run: |
          aws s3 cp frontend/build/index.html \
            s3://${{ vars.FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache for index.html
        # Only index.html needs invalidating — all other assets have new URLs each deploy.
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DIST_ID }} \
            --paths "/index.html"
